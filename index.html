<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S&OP 적중률 모니터링</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; background:#f5f5f5; }
.frame-wrap { position:relative; width:100%; height:100vh; }
.frame-wrap iframe { position:absolute; top:0; left:0; width:100%; height:100vh; border:none; visibility:hidden; pointer-events:none; }
.frame-wrap iframe.active { visibility:visible; pointer-events:auto; z-index:1; }
</style>
</head>
<body>

<div class="frame-wrap">
  <iframe id="frame-w12"></iframe>
  <iframe id="frame-w13"></iframe>
  <iframe id="frame-w14"></iframe>
  <iframe id="frame-w15"></iframe>
  <iframe id="frame-w16"></iframe>
  <iframe id="frame-w17"></iframe>
  <iframe id="frame-w18" class="active"></iframe>
  <iframe id="frame-compare"></iframe>
</div>

<script>
const ts = Date.now();
document.getElementById('frame-w12').src = 'monitor_w12.html?t=' + ts;
document.getElementById('frame-w13').src = 'monitor_w13.html?t=' + ts;
document.getElementById('frame-w14').src = 'monitor_w14.html?t=' + ts;
document.getElementById('frame-w15').src = 'monitor_w15.html?t=' + ts;
document.getElementById('frame-w16').src = 'monitor_w16.html?t=' + ts;
document.getElementById('frame-w17').src = 'monitor_w17.html?t=' + ts;
document.getElementById('frame-w18').src = 'monitor_w18.html?t=' + ts;
document.getElementById('frame-compare').src = 'monitor_compare.html?t=' + ts;

function switchWeek(week) {
  document.querySelectorAll('.frame-wrap iframe').forEach(f => f.classList.remove('active'));
  document.getElementById('frame-' + week).classList.add('active');
}

window.switchWeek = switchWeek;

// iframe 내부에서 postMessage로 주차 전환 요청 수신
window.addEventListener('message', function(e) {
  if (e.data && e.data.week) switchWeek(e.data.week);
});
</script>
</body>
</html>
